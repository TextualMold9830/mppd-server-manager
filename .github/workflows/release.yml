name: Release
on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Native Package
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            installer: deb
          - os: windows-latest
            installer: exe
          - os: macos-latest
            installer: dmg
    
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Build with Maven
        run: mvn clean package -DskipTests
        
      - name: Prepare Package Input and Module Path
        run: |
          mkdir -p target/package
          cp target/mppd-server-manager-1.0-SNAPSHOT.jar target/package/
          mvn dependency:copy-dependencies -DoutputDirectory=target/module-path
        
      - name: Create Native Installer
        run: jpackage --name "MPPDServerManager" --input target/package --main-jar mppd-server-manager-1.0-SNAPSHOT.jar --main-class textualmold9830.mppd.Main --type ${{ matrix.installer }} --dest target/installer --module-path target/module-path --add-modules javafx.controls,javafx.fxml,java.sql,java.desktop,java.logging,java.xml --jlink-options "--strip-debug --no-man-pages --no-header-files --compress zip-9"

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: MPPDServerManager-${{ matrix.os }}
          path: target/installer/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.run_number }}
          tag_name: ${{ github.ref_name == 'master' && 'nightly' || github.ref_name }}
          prerelease: ${{ github.ref_name == 'master' }}
          generate_release_notes: true
          files: |
            artifacts/*/*
